<!DOCTYPE html>
<html>
<head>
    <title>Heart Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }
        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            font-size: 16px;
        }
        button:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>❤️ Heart Disease Analyzer</h2>

    <form action="/predict_heart" method="POST">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="sex">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Chest Pain Type (0-3)</label>
        <input type="number" name="cp">

        <label>Resting Blood Pressure</label>
        <input type="number" name="trestbps">

        <label>Cholesterol</label>
        <input type="number" name="chol">

        <label>Fasting Blood Sugar</label>
        <select name="fbs">
            <option value="1">True</option>
            <option value="0">False</option>
        </select>

        <label>Rest ECG</label>
        <input type="number" name="restecg">

        <label>Max Heart Rate</label>
        <input type="number" name="thalach">

        <label>Exercise Induced Angina</label>
        <select name="exang">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Old Peak</label>
        <input type="number" step="0.1" name="oldpeak">

        <label>Slope</label>
        <input type="number" name="slope">

        <label>CA</label>
        <input type="number" name="ca">

        <label>Thal</label>
        <input type="number" name="thal">

        <button type="submit">Analyze</button>

    </form>
</div>

</body>
</html>
